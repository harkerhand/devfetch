name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --locked --verbose

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release --locked --verbose

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: cp target/release/rsenv target/release/rsenv-${{ matrix.platform }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item target/release/rsenv.exe target/release/rsenv-${{ matrix.platform }}.exe

      - name: Upload binaries (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: rsenv-${{ matrix.platform }}
          path: target/release/rsenv-${{ matrix.platform }}

      - name: Upload binaries (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: rsenv-${{ matrix.platform }}
          path: target/release/rsenv-${{ matrix.platform }}.exe

  release:
    name: Release
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded_artifacts

      - name: Prepare release binaries
        shell: bash
        run: |
          mkdir -p release_binaries
          cp ./downloaded_artifacts/rsenv-linux/rsenv-linux release_binaries/rsenv-linux
          cp ./downloaded_artifacts/rsenv-macos/rsenv-macos release_binaries/rsenv-macos
          cp ./downloaded_artifacts/rsenv-windows/rsenv-windows.exe release_binaries/rsenv-windows.exe
          chmod +x release_binaries/rsenv-linux release_binaries/rsenv-macos

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_binaries/rsenv-linux
            release_binaries/rsenv-macos
            release_binaries/rsenv-windows.exe
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
