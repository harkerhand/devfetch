name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable corepack (pnpm/yarn)
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --locked --verbose

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release --locked --verbose

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: cp target/release/envfetch target/release/envfetch-${{ matrix.platform }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item target/release/envfetch.exe target/release/envfetch-${{ matrix.platform }}.exe

      - name: Upload binaries (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: envfetch-${{ matrix.platform }}
          path: target/release/envfetch-${{ matrix.platform }}

      - name: Upload binaries (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: envfetch-${{ matrix.platform }}
          path: target/release/envfetch-${{ matrix.platform }}.exe

  release:
    name: Release
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded_artifacts

      - name: Prepare release binaries
        shell: bash
        run: |
          mkdir -p release_binaries
          cp ./downloaded_artifacts/envfetch-linux/envfetch-linux release_binaries/envfetch-linux
          cp ./downloaded_artifacts/envfetch-macos/envfetch-macos release_binaries/envfetch-macos
          cp ./downloaded_artifacts/envfetch-windows/envfetch-windows.exe release_binaries/envfetch-windows.exe
          chmod +x release_binaries/envfetch-linux release_binaries/envfetch-macos

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_binaries/envfetch-linux
            release_binaries/envfetch-macos
            release_binaries/envfetch-windows.exe
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
