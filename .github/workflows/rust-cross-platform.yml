name: Rust Cross-Platform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-ci:
    name: Rust on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --locked --verbose

      - name: Test
        run: cargo test --locked --verbose

      - name: Smoke report (JSON)
        run: |
          cargo run --locked -- --system --binaries --languages --json > envinfo-${{ matrix.os }}.json

      - name: Smoke report (Markdown)
        run: |
          cargo run --locked -- --system --binaries --markdown > envinfo-${{ matrix.os }}.md

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: envinfo-report-${{ matrix.os }}
          path: |
            envinfo-${{ matrix.os }}.json
            envinfo-${{ matrix.os }}.md
          if-no-files-found: error
